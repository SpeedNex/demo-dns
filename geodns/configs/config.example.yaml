server:
  listen_addr: ":5354"
  # DNS 监听地址。配置后启用 DNS 协议服务，通过标准 DNS A/AAAA 查询返回 resolver IP。
  # 设置为 "disabled" 或空则禁用 DNS 服务器。
  listen_dns_addr: ":53"
  # 2026-06-15: portal-web hosts the health-view endpoint now.
  console_health_url: "http://127.0.0.1:8081/api/v1/internal/geodns/health-view"
  # 必须与 portal-web 中 INTERNAL_SHARED_TOKEN 保持一致；portal 中间件
  # 通过 X-Internal-Token 校验。容器化部署推荐用环境变量 GEODNS_INTERNAL_TOKEN
  # 注入，不要把 token 写进镜像。
  # console_health_token: "your-internal-shared-token"
  refresh_interval: "15s"
routing:
  global_fallback_region: "global"
  # serve_domain 是 GeoDNS 服务的域名。
  # 配置后只对此域名（及其子域名）的 A/AAAA 查询返回 resolver IP。
  # 例如 "dns.example.com" → 查询 dns.example.com 返回 resolver IP
  # 留空则响应所有域名。
  # serve_domain: "dns.example.com"
