worker_processes 1;
error_log /tmp/nginx-doh-error.log;
pid /tmp/nginx-doh.pid;

events {
    worker_connections 256;
}

http {
    access_log /tmp/nginx-doh-access.log;
    
    server {
        listen 8443 ssl default_server;
        server_name dns.ocerdns.local;
        
        ssl_certificate /tmp/dns.ocerdns.local.pem;
        ssl_certificate_key /tmp/dns.ocerdns.local-key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        
        location / {
            proxy_pass http://127.0.0.1:8444;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
