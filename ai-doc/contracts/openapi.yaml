components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    nodeBearer:
      type: http
      scheme: bearer
      description: |
        Resolver pre-issued API key. Issued exactly once by
        `POST /api/v1/admin/nodes` (or re-issued by
        `POST /api/v1/admin/nodes/{node_id}/credentials`).
        Stored in `configs/server.yaml` as `control_plane.api_key`.
        Used as `Authorization: Bearer <api_key>` on every agent
        request.
    apiKeyHmac:
      type: apiKey
      in: header
      name: X-Signature
      description: |
        HMAC-SHA256 of `<ts>\n<METHOD>\n<path>\n<sha256(body) hex>` keyed
        by the resolver's pre-issued secret. Companion headers:
        `X-Hmac-Key` (the secret), `X-Timestamp` (unix seconds), `X-Nonce`
        (16 random bytes hex). The console stores only the SHA-256 hash
        of the secret.
    adminBearer:
      type: http
      scheme: bearer
      description: Admin session bearer; required for `POST /api/v1/admin/nodes`.
    internalHmac:
      type: apiKey
      in: header
      name: X-Internal-Signature
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    ProfileId:
      name: profile_id
      in: path
      required: true
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 120
    RuleId:
      name: rule_id
      in: path
      required: true
      schema:
        type: string
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    FailedDependency:
      description: Failed dependency
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      required:
      - error
      - trace_id
      properties:
        error:
          type: object
          required:
          - code
          - message
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
        trace_id:
          type: string
    PageMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        trace_id:
          type: string
    RegisterRequest:
      type: object
      required:
      - name
      - email
      - password
      - password_confirmation
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        password_confirmation:
          type: string
          minLength: 8
        timezone:
          type: string
          default: UTC
        locale:
          type: string
          default: en
    LoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        device_name:
          type: string
    AuthResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            token:
              type: string
            user:
              $ref: '#/components/schemas/User'
    User:
      type: object
      required:
      - id
      - name
      - email
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum:
          - member
          - admin
        timezone:
          type: string
        locale:
          type: string
        plan_code:
          type: string
    Profile:
      type: object
      required:
      - id
      - name
      - status
      - current_version
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum:
          - active
          - disabled
          - deleted
        default_action:
          type: string
          enum:
          - allow
          - block
        block_response:
          type: string
          enum:
          - nxdomain
          - zero_ip
          - refused
          - block_page
        current_version:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        security_enabled:
          type: boolean
        privacy_enabled:
          type: boolean
        parental_enabled:
          type: boolean
        safe_search_enabled:
          type: boolean
        log_mode:
          type: string
          enum:
          - full
          - blocked_only
          - disabled
    ProfileCreateRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 500
        default_action:
          type: string
          enum:
          - allow
          - block
          default: allow
        block_response:
          type: string
          enum:
          - nxdomain
          - zero_ip
          - refused
          default: nxdomain
        security_enabled:
          type: boolean
        privacy_enabled:
          type: boolean
        parental_enabled:
          type: boolean
        safe_search_enabled:
          type: boolean
        log_mode:
          type: string
          enum:
          - full
          - blocked_only
          - disabled
          default: full
    ProfileUpdateRequest:
      allOf:
      - $ref: '#/components/schemas/ProfileCreateRequest'
      properties:
        security_enabled:
          type: boolean
        privacy_enabled:
          type: boolean
        parental_enabled:
          type: boolean
        safe_search_enabled:
          type: boolean
        log_mode:
          type: string
          enum:
          - full
          - blocked_only
          - disabled
          default: full
    ProfilePublish:
      type: object
      properties:
        id:
          type: string
        profile_id:
          type: string
        status:
          type: string
          enum:
          - pending
          - in_progress
          - completed
          - failed
        message:
          type: string
          nullable: true
        progress:
          type: integer
          minimum: 0
          maximum: 100
        triggered_by:
          type: string
          description: User ID who triggered the publish
        triggered_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
          nullable: true
    ProfileRule:
      type: object
      properties:
        id:
          type: string
        profile_id:
          type: string
        list_type:
          type: string
          enum:
          - allow
          - block
        match_type:
          type: string
          enum:
          - exact
          - suffix
          - wildcard
        domain:
          type: string
        normalized_domain:
          type: string
        action:
          type: string
          enum:
          - allow
          - block
          - rewrite
        category:
          type: string
        enabled:
          type: boolean
    ProfileRuleCreateRequest:
      type: object
      required:
      - list_type
      - match_type
      - domain
      properties:
        list_type:
          type: string
          enum:
          - allow
          - block
        match_type:
          type: string
          enum:
          - exact
          - suffix
          - wildcard
        domain:
          type: string
          maxLength: 255
        action:
          type: string
          enum:
          - allow
          - block
          nullable: true
        category:
          type: string
          default: custom
        note:
          type: string
    PublishResult:
      type: object
      properties:
        profile_id:
          type: string
        version:
          type: integer
          format: int64
        checksum:
          type: string
        publish_id:
          type: string
        status:
          type: string
    InternalPublishRequest:
      type: object
      required:
      - profile_id
      - user_id
      - version
      - checksum
      - config
      properties:
        profile_id:
          type: string
        user_id:
          type: string
        team_id:
          type: string
          nullable: true
        version:
          type: integer
          format: int64
        checksum:
          type: string
        config:
          type: object
        quota:
          type: object
        message:
          type: string
    InternalPublishResponse:
      type: object
      properties:
        publish_id:
          type: string
        config_version:
          type: integer
          format: int64
        status:
          type: string
        target_node_count:
          type: integer
    PublishStatus:
      type: object
      properties:
        publish_id:
          type: string
        status:
          type: string
        target_node_count:
          type: integer
        applied_node_count:
          type: integer
        failed_node_count:
          type: integer
        latest_error:
          type: string
          nullable: true
    NodeProvisionRequest:
      type: object
      required:
      - node_name
      - region
      - supported_protocols
      properties:
        node_name:
          type: string
          minLength: 1
          maxLength: 100
          description: Unique resolver node name, e.g. "resolver-hk-01"
        region:
          type: string
          description: Region tag, e.g. "ap-east-1"
        country:
          type: string
        city:
          type: string
        provider:
          type: string
        public_ipv4:
          type: string
        public_ipv6:
          type: string
        supported_protocols:
          type: array
          items:
            type: string
            enum:
            - udp
            - tcp
            - doh
            - dot
        capacity_qps:
          type: integer
          minimum: 1
          default: 5000
        weight:
          type: integer
          minimum: 1
          default: 100
        labels:
          type: object
    NodeProvisionResponse:
      type: object
      required:
      - node_id
      - api_key
      - secret
      - heartbeat_interval_seconds
      - config_poll_interval_seconds
      properties:
        node_id:
          type: string
          description: Pre-assigned node id; must be passed to `resolver install --node-id`.
        api_key:
          type: string
          description: |
            Plain-text API key. Returned **exactly once**. Operator must run
            `resolver install --api-key=...` immediately and never store it
            in plaintext outside the resolver's `configs/server.yaml`.
        secret:
          type: string
          description: |
            Plain-text HMAC secret. Returned **exactly once**. Same handling
            as `api_key`.
        heartbeat_interval_seconds:
          type: integer
        config_poll_interval_seconds:
          type: integer
        latest_config_version:
          type: integer
          format: int64
        server_time:
          type: string
          format: date-time
    NodeHeartbeatRequest:
      type: object
      required:
      - node_id
      - status
      - uptime_seconds
      - current_config_version
      properties:
        node_id:
          type: string
        status:
          type: string
          enum:
          - online
          - offline
          description: |
            节点是否在岗；不再表达 healthy/degraded/unhealthy 等健康度信息
        uptime_seconds:
          type: integer
          format: int64
        version:
          type: string
        current_config_version:
          type: integer
          format: int64
        profiles_loaded:
          type: integer
        last_config_pull_at:
          type: string
          format: date-time
        last_log_flush_at:
          type: string
          format: date-time
    NodeHeartbeatResponse:
      type: object
      properties:
        ok:
          type: boolean
        server_time:
          type: string
          format: date-time
        node_status:
          type: string
        latest_config_version:
          type: integer
          format: int64
        should_pull_config:
          type: boolean
        next_heartbeat_after_seconds:
          type: integer
    ResolverConfigResponse:
      type: object
      properties:
        data:
          type: object
    ConfigAckRequest:
      type: object
      required:
      - node_id
      - config_version
      - checksum
      - status
      properties:
        node_id:
          type: string
        config_version:
          type: integer
          format: int64
        checksum:
          type: string
        status:
          type: string
          enum:
          - applied
          - failed
        applied_at:
          type: string
          format: date-time
        error_code:
          type: string
          nullable: true
        error_message:
          type: string
          nullable: true
    QueryLogItem:
      type: object
      required:
      - timestamp
      - profile_id
      - query_name
      - query_type
      - action
      - latency_ms
      - node_id
      - event_id
      - user_id
      - profile_version
      properties:
        timestamp:
          type: string
          format: date-time
        profile_id:
          type: string
        user_id:
          type: string
        team_id:
          type: string
          nullable: true
        device_id:
          type: string
          nullable: true
        query_name:
          type: string
        query_type:
          type: string
        action:
          type: string
          enum:
          - allowed
          - blocked
          - rewritten
          - error
        reason:
          type: string
        category:
          type: string
        rule_id:
          type: string
          nullable: true
        latency_ms:
          type: integer
        upstream:
          type: string
          nullable: true
        rcode:
          type: string
        client_ip_hash:
          type: string
        profile_version:
          type: integer
          format: int64
        node_id:
          type: string
        event_id:
          type: string
        query_name_hash:
          type: string
          nullable: true
    QueryLogBatch:
      type: object
      required:
      - batch_id
      - node_id
      - sent_at
      - items
      properties:
        batch_id:
          type: string
        node_id:
          type: string
        sent_at:
          type: string
          format: date-time
        items:
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/QueryLogItem'
    BatchAcceptedResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            accepted:
              type: boolean
            batch_id:
              type: string
            received_count:
              type: integer
            duplicate:
              type: boolean
    MetricsBatch:
      type: object
      description: |
        已下线：ops 监控只关心节点在线/离线，不再接收 resolver 指标 batch
        （保留 schema 占位，仅用于 openapi 旧版本兼容，不得作为 Agent 端契约）
      properties:
        node_id:
          type: string
        sent_at:
          type: string
          format: date-time
    GeodnsHealthViewResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            generated_at:
              type: string
              format: date-time
            ttl_seconds:
              type: integer
            nodes:
              type: array
              items:
                type: object
                properties:
                  node_id:
                    type: string
                  region:
                    type: string
                  country:
                    type: string
                  city:
                    type: string
                  status:
                    type: string
                  public_ipv4:
                    type: string
                  public_ipv6:
                    type: string
                  supported_protocols:
                    type: array
                    items:
                      type: string
                  weight:
                    type: integer
                  last_heartbeat_at:
                    type: string
                    format: date-time
    Money:
      type: object
      required:
      - amount_minor
      - currency
      properties:
        amount_minor:
          type: integer
          format: int64
          minimum: 0
        currency:
          type: string
          minLength: 3
          maxLength: 3
        minor_unit:
          type: integer
          minimum: 0
          maximum: 3
    Plan:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
          enum:
          - free
          - pro
          - business
          - education
          - enterprise
        name:
          type: string
        billing_model:
          type: string
          enum:
          - free_quota
          - flat_subscription
          - employee_block
          - student_block
          - custom_contract
        status:
          type: string
        profile_limit:
          type:
          - integer
          - 'null'
        device_limit:
          type:
          - integer
          - 'null'
        query_limit_monthly:
          type:
          - integer
          - 'null'
          format: int64
        block_size:
          type:
          - integer
          - 'null'
        unit_label:
          type: string
          enum:
          - account
          - employee_block_50
          - student_block_250
          - contract
        log_retention_days:
          type: integer
        prices:
          type: array
          items:
            $ref: '#/components/schemas/PlanPrice'
    PlanPrice:
      type: object
      required:
      - id
      - plan_id
      - billing_interval
      - unit_amount_minor
      - currency
      properties:
        id:
          type: string
        plan_id:
          type: string
        billing_interval:
          type: string
          enum:
          - month
          - year
        unit_amount_minor:
          type: integer
          format: int64
          minimum: 0
        currency:
          type: string
        trial_days:
          type: integer
          minimum: 0
        status:
          type: string
          enum:
          - active
          - archived
        unit_label:
          type: string
          enum:
          - account
          - employee_block_50
          - student_block_250
          - contract
        block_size:
          type:
          - integer
          - 'null'
    Subscription:
      type: object
      properties:
        id:
          type: string
        plan_id:
          type: string
        plan_price_id:
          type: string
        status:
          type: string
          enum:
          - trialing
          - active
          - past_due
          - canceled
          - expired
        current_period_start:
          type: string
          format: date-time
        current_period_end:
          type: string
          format: date-time
        cancel_at_period_end:
          type: boolean
        seat_count:
          type:
          - integer
          - 'null'
        block_quantity:
          type:
          - integer
          - 'null'
    CheckoutRequest:
      type: object
      required:
      - plan_price_id
      - success_url
      - cancel_url
      properties:
        plan_price_id:
          type: string
        success_url:
          type: string
          format: uri
        cancel_url:
          type: string
          format: uri
        seat_count:
          type:
          - integer
          - 'null'
          minimum: 1
          description: Business employee count or Education student count. Personal Pro should omit it.
    CheckoutResponse:
      type: object
      properties:
        checkout_id:
          type: string
        checkout_url:
          type: string
        order_id:
          type: string
        amount_minor:
          type: integer
          format: int64
        currency:
          type: string
    Invoice:
      type: object
      properties:
        id:
          type: string
        invoice_no:
          type: string
        currency:
          type: string
        subtotal_amount_minor:
          type: integer
          format: int64
        discount_amount_minor:
          type: integer
          format: int64
        tax_amount_minor:
          type: integer
          format: int64
        total_amount_minor:
          type: integer
          format: int64
        amount_paid_minor:
          type: integer
          format: int64
        amount_due_minor:
          type: integer
          format: int64
        status:
          type: string
        finalized_at:
          type: string
          format: date-time
          nullable: true
    Payment:
      type: object
      properties:
        id:
          type: string
        provider:
          type: string
        amount_minor:
          type: integer
          format: int64
        currency:
          type: string
        status:
          type: string
        paid_at:
          type: string
          format: date-time
          nullable: true
    RefundCreateRequest:
      type: object
      required:
      - payment_id
      - amount_minor
      - currency
      - reason
      properties:
        payment_id:
          type: string
        amount_minor:
          type: integer
          format: int64
          minimum: 1
        currency:
          type: string
          minLength: 3
          maxLength: 3
        reason:
          type: string
          maxLength: 120
    Refund:
      type: object
      properties:
        id:
          type: string
        payment_id:
          type: string
        amount_minor:
          type: integer
          format: int64
        currency:
          type: string
        status:
          type: string
    UsageBatchRequest:
      type: object
      required:
      - source
      - source_batch_id
      - sent_at
      - items
      properties:
        source:
          type: string
          enum:
          - dns-console-web
        source_batch_id:
          type: string
        sent_at:
          type: string
          format: date-time
        checksum:
          type: string
        items:
          type: array
          minItems: 1
          maxItems: 10000
          items:
            $ref: '#/components/schemas/UsageBatchItem'
        billing_semantics:
          type: string
          enum:
          - quota_and_analytics_only
          description: V1 usage batches are not usage-overage invoices.
    UsageBatchItem:
      type: object
      required:
      - profile_id
      - user_id
      - period_start
      - period_end
      - query_count
      - blocked_count
      properties:
        profile_id:
          type: string
        user_id:
          type: string
        period_start:
          type: string
          format: date-time
        period_end:
          type: string
          format: date-time
        query_count:
          type: integer
          format: int64
          minimum: 0
        blocked_count:
          type: integer
          format: int64
          minimum: 0
    UsageBatchResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            accepted:
              type: boolean
            source_batch_id:
              type: string
            received_count:
              type: integer
            duplicate:
              type: boolean
    PublishStatusCallback:
      type: object
      required:
      - publish_id
      - profile_id
      - profile_version
      - config_version
      - status
      - status_version
      properties:
        publish_id:
          type: string
        profile_id:
          type: string
        profile_version:
          type: integer
          format: int64
        config_version:
          type: integer
          format: int64
        status:
          type: string
        target_node_count:
          type: integer
        applied_node_count:
          type: integer
        failed_node_count:
          type: integer
        status_version:
          type: integer
          format: int64
        latest_error:
          type: string
          nullable: true
    QuotaSnapshotRequest:
      type: object
      required:
      - profile_id
      - user_id
      - plan_code
      - quota_version
      - monthly_query_limit
      - used_query_count
      - quota_status
      properties:
        profile_id:
          type: string
        user_id:
          type: string
        plan_code:
          type: string
          enum:
          - free
          - pro
          - business
          - education
          - enterprise
        quota_version:
          type: integer
          format: int64
        monthly_query_limit:
          type:
          - integer
          - 'null'
          format: int64
        used_query_count:
          type: integer
          format: int64
        quota_status:
          type: string
          enum:
          - normal
          - exceeded
          - unlimited
          description: |
            normal=Free 未超额可服务；exceeded=Free 超额 resolver 硬拒绝返回 SERVFAIL；unlimited=付费套餐不触发拒绝
        log_retention_days:
          type: integer
        features:
          type: object
    QuotaStatusResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/QuotaSnapshotRequest'
    SecuritySettings:
      type: object
      required:
      - enabled
      properties:
        enabled:
          type: boolean
        block_malware:
          type: boolean
          default: true
        block_phishing:
          type: boolean
          default: true
        block_command_and_control:
          type: boolean
          default: true
        block_cryptojacking:
          type: boolean
          default: true
      additionalProperties: false
    PrivacySettings:
      type: object
      required:
      - enabled
      - log_mode
      properties:
        enabled:
          type: boolean
        block_trackers:
          type: boolean
          default: true
        block_analytics:
          type: boolean
          default: true
        block_telemetry:
          type: boolean
          default: true
        anonymize_client_ip:
          type: boolean
          default: true
        log_mode:
          type: string
          enum:
          - full
          - blocked_only
          - disabled
          default: full
      additionalProperties: false
    ParentalSettings:
      type: object
      required:
      - enabled
      properties:
        enabled:
          type: boolean
        block_adult_content:
          type: boolean
          default: false
        safe_search:
          type: boolean
          default: false
        youtube_restricted_mode:
          type: boolean
          default: false
        block_gambling_basic:
          type: boolean
          default: false
      additionalProperties: false
    ListRuleCreateRequest:
      type: object
      required:
      - match_type
      - domain
      properties:
        match_type:
          type: string
          enum:
          - exact
          - suffix
          - wildcard
        domain:
          type: string
          maxLength: 255
        note:
          type: string
          maxLength: 255
      additionalProperties: false
    MemberCenterOverviewResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            navigation:
              type: array
              items:
                type: string
                enum:
                - security
                - privacy
                - parental
                - blocklist
                - allowlist
                - analytics
                - logs
                - settings
                - membership
            current_profile_id:
              type:
              - string
              - 'null'
