openapi: 3.1.0
info:
  title: OcerDNS Security Platform API
  version: 0.1.0
  description: NextDNS Lite V1 API contract for portal-web and dns-console-web. V1 uses Free quota + flat subscription, not
    DNS query overage billing.
servers:
- url: https://portal.example.com
  description: portal-web
- url: https://dns-console.example.com
  description: OcerDNS
security:
- bearerAuth: []
paths:
  /api/v1/public/auth/register:
    post:
      tags:
      - portal-public
      summary: Register user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/public/auth/login:
    post:
      tags:
      - portal-public
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/member/me:
    get:
      tags:
      - portal-member
      summary: Current user
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
  /api/v1/member/profiles:
    get:
      tags:
      - portal-member
      summary: List profiles
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Profile list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Profile'
                  meta:
                    $ref: '#/components/schemas/PageMeta'
    post:
      tags:
      - portal-member
      summary: Create profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Profile'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/member/profiles/{profile_id}:
    parameters:
    - $ref: '#/components/parameters/ProfileId'
    get:
      tags:
      - portal-member
      summary: Get profile
      responses:
        '200':
          description: Profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Profile'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
      - portal-member
      summary: Update profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Profile'
    delete:
      tags:
      - portal-member
      summary: Delete profile
      responses:
        '204':
          description: Deleted
  /api/v1/member/profiles/{profile_id}/rules:
    parameters:
    - $ref: '#/components/parameters/ProfileId'
    get:
      tags:
      - portal-member
      summary: List profile rules
      responses:
        '200':
          description: Rule list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProfileRule'
    post:
      tags:
      - portal-member
      summary: Create profile rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileRuleCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ProfileRule'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/member/profiles/{profile_id}/rules/{rule_id}:
    parameters:
    - $ref: '#/components/parameters/ProfileId'
    - name: rule_id
      in: path
      required: true
      schema:
        type: string
    delete:
      tags:
      - portal-member
      summary: Delete profile rule
      responses:
        '204':
          description: Deleted
  /api/v1/member/profiles/{profile_id}/publish:
    parameters:
    - $ref: '#/components/parameters/ProfileId'
    post:
      tags:
      - portal-member
      summary: Publish profile config
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  maxLength: 255
                force:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Publish queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/PublishResult'
        '409':
          $ref: '#/components/responses/Conflict'
        '424':
          $ref: '#/components/responses/FailedDependency'
  /api/v1/member/profiles/{profile_id}/logs:
    parameters:
    - $ref: '#/components/parameters/ProfileId'
    get:
      tags:
      - portal-member
      summary: Query DNS logs
      parameters:
      - name: from
        in: query
        schema:
          type: string
          format: date-time
      - name: to
        in: query
        schema:
          type: string
          format: date-time
      - name: action
        in: query
        schema:
          type: string
          enum:
          - allowed
          - blocked
          - rewritten
          - error
      - name: domain
        in: query
        schema:
          type: string
      responses:
        '200':
          description: DNS logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/QueryLogItem'
                  meta:
                    $ref: '#/components/schemas/PageMeta'
  /api/v1/internal/profile-publishes:
    post:
      tags:
      - console-internal
      summary: Publish profile config from portal-web to dns-console-web
      security:
      - internalHmac: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalPublishRequest'
      responses:
        '200':
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/InternalPublishResponse'
  /api/v1/internal/geodns/health-view:
    get:
      tags:
      - console-internal
      security:
      - internalHmac: []
      summary: Health view for geodns
      responses:
        '200':
          description: Health view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeodnsHealthViewResponse'
  /api/v1/admin/nodes:
    post:
      tags:
      - console-admin
      summary: Provision a resolver node and issue its pre-issued credentials
      description: |
        Admin-side endpoint. Creates a resolver node record and issues
        `(node_id, api_key, secret)` tuple used by `resolver install`.
        The plain-text api_key and secret are returned **exactly once** in
        the response and must be handed to the operator who runs
        `resolver install`. The console only stores the SHA-256 hash.
      security:
      - adminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeProvisionRequest'
      responses:
        '201':
          description: Provisioned
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/NodeProvisionResponse'
  /api/v1/admin/nodes/{node_id}/credentials:
    parameters:
    - name: node_id
      in: path
      required: true
      schema:
        type: string
    post:
      tags:
      - console-admin
      summary: Re-issue pre-issued credentials for an existing node
      description: |
        Revokes the previous api_key/secret pair and issues a new
        `(api_key, secret)` tuple. Plain-text values are returned exactly
        once. The previous credentials stop working immediately.
      security:
      - adminBearer: []
      responses:
        '200':
          description: New credentials issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/NodeProvisionResponse'
  /api/v1/agent/nodes/heartbeat:
    post:
      tags:
      - console-agent
      summary: Submit node heartbeat
      security:
      - nodeBearer: []
      - apiKeyHmac: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeHeartbeatRequest'
      responses:
        '200':
          description: Heartbeat accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/NodeHeartbeatResponse'
  /api/v1/agent/resolver/config:
    get:
      tags:
      - console-agent
      summary: Pull resolver config
      security:
      - nodeBearer: []
      parameters:
      - name: node_id
        in: query
        required: true
        schema:
          type: string
      - name: current_version
        in: query
        required: true
        schema:
          type: integer
          format: int64
          minimum: 0
      responses:
        '200':
          description: Config bundle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolverConfigResponse'
        '204':
          description: No change
  /api/v1/agent/resolver/config/ack:
    post:
      tags:
      - console-agent
      summary: Ack resolver config
      security:
      - nodeBearer: []
      - apiKeyHmac: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigAckRequest'
      responses:
        '200':
          description: Ack accepted
  /api/v1/agent/query-logs/batch:
    post:
      tags:
      - console-agent
      summary: Upload DNS query logs
      security:
      - nodeBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryLogBatch'
      responses:
        '200':
          description: Batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchAcceptedResponse'
  /api/v1/public/plans:
    get:
      tags:
      - portal-public
      summary: List public plans and active prices
      security: []
      responses:
        '200':
          description: Plans
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Plan'
  /api/v1/member/subscription:
    get:
      tags:
      - portal-billing
      summary: Get current subscription
      responses:
        '200':
          description: Subscription
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Subscription'
  /api/v1/member/subscription/checkout:
    post:
      tags:
      - portal-billing
      summary: Create checkout for subscription
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        '200':
          description: Checkout created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CheckoutResponse'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/member/invoices:
    get:
      tags:
      - portal-billing
      summary: List member invoices
      responses:
        '200':
          description: Invoices
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Invoice'
  /api/v1/member/payments:
    get:
      tags:
      - portal-billing
      summary: List member payments
      responses:
        '200':
          description: Payments
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Payment'
  /api/v1/public/billing/webhooks/{provider}:
    post:
      tags:
      - portal-billing
      summary: Receive payment provider webhook
      security: []
      parameters:
      - name: provider
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Webhook accepted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/internal/usage/batches:
    post:
      tags:
      - portal-internal
      summary: '[V2+ 待落地] Receive query usage batch for Free quota and analytics only'
      security:
      - internalHmac: []
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsageBatchRequest'
      responses:
        '200':
          description: Usage accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageBatchResponse'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
      description: |
        V1 **不实现**。当前 dns-console-web 在 `query_log_ingest_batches` 内完成
        使用量派生，由 `portal-web` 主动 `GET /api/v1/internal/query-logs` /
        `GET /api/v1/internal/query-analytics` 反向拉取汇总（见 dns-console-web
        `routes/api.php` 实际路由）。V2+ 评估替换为 push 模型。
  /api/v1/internal/publish-status/callback:
    post:
      tags:
      - portal-internal
      summary: '[V2+ 待落地] Receive publish status callback from dns-console-web'
      security:
      - internalHmac: []
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishStatusCallback'
      responses:
        '200':
          description: Callback accepted
        '409':
          $ref: '#/components/responses/Conflict'
      description: |
        V1 **不实现**。portal-web 通过 `GET /api/v1/admin/publishes` 主动轮询
        publish_tasks 状态。V2+ 评估 push 回调。
  /api/v1/admin/refunds:
    post:
      tags:
      - portal-admin
      summary: Create refund
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundCreateRequest'
      responses:
        '201':
          description: Refund created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Refund'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/internal/quota/snapshots:
    post:
      tags:
      - console-internal
      summary: '[V2+ 待落地] Receive quota snapshot from portal-web'
      security:
      - internalHmac: []
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuotaSnapshotRequest'
      responses:
        '200':
          description: Quota snapshot accepted
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
      description: |
        V1 **不实现**。V1 由 portal-web 在 Profile / publish 流程中内嵌 quota
        snapshot，并通过 `POST /api/v1/internal/profile-publishes` 的 `quota` 字段
        一次性下发；dns-console-web 落 `quota_snapshots` 表供 resolver 拉取。
  /api/v1/internal/query-logs:
    get:
      tags:
      - console-internal
      summary: Read aggregated query logs for a user
      security:
      - internalHmac: []
      parameters:
      - name: user_id
        in: query
        required: true
        schema:
          type: string
      - name: action
        in: query
        schema:
          type: string
      - name: domain
        in: query
        schema:
          type: string
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
      - name: per_page
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
      responses:
        '200':
          description: Query log list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/QueryLogItem'
                  meta:
                    $ref: '#/components/schemas/PageMeta'
  /api/v1/internal/query-analytics:
    get:
      tags:
      - console-internal
      summary: Read aggregated query analytics summary for a user
      security:
      - internalHmac: []
      parameters:
      - name: user_id
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Analytics summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
  /api/v1/member/usage/quota:
    get:
      tags:
      - portal-member
      summary: Get current NextDNS Lite quota status
      responses:
        '200':
          description: Quota status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuotaStatusResponse'
  /api/v1/member/overview:
    get:
      tags:
      - portal-member
      summary: Get member overview and navigation
      responses:
        '200':
          description: Member overview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberCenterOverviewResponse'
  /api/v1/member/dashboard:
    get:
      tags:
      - portal-member
      summary: Get member dashboard summary
      responses:
        '200':
          description: Dashboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'
      parameters:
      - name: profile_id
        in: query
        schema:
          type: string
      - name: range
        in: query
        schema:
          type: string
          enum:
          - 24h
          - 7d
          - 30d
          default: 24h
  /api/v1/member/profiles/{profile_id}/settings:
    parameters:
    - $ref: '#/components/parameters/ProfileId'
    get:
      tags:
      - portal-member
      summary: Get all profile settings
      description: |
        Get all settings for a profile including security, privacy, and parental control.
        This consolidates all profile-level settings into one endpoint.
      responses:
        '200':
          description: Profile settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      security:
                        $ref: '#/components/schemas/SecuritySettings'
                      privacy:
                        $ref: '#/components/schemas/PrivacySettings'
                      parental:
                        $ref: '#/components/schemas/ParentalSettings'
    put:
      tags:
      - portal-member
      summary: Update profile settings
      description: |
        Update all or part of profile settings.
        Can update security, privacy, parental control settings individually or together.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                security:
                  $ref: '#/components/schemas/SecuritySettings'
                privacy:
                  $ref: '#/components/schemas/PrivacySettings'
                parental:
                  $ref: '#/components/schemas/ParentalSettings'
      responses:
        '200':
          description: Updated
  /api/v1/member/profiles/{profile_id}/settings/security:
    parameters:
    - $ref: '#/components/parameters/ProfileId'
    get:
      tags:
      - portal-member
      summary: Get profile Security settings
      responses:
        '200':
          description: Security settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SecuritySettings'
    put:
      tags:
      - portal-member
      summary: Update profile Security settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SecuritySettings'
      responses:
        '200':
          description: Updated
  /api/v1/member/profiles/{profile_id}/settings/privacy:
    parameters:
    - $ref: '#/components/parameters/ProfileId'
    get:
      tags:
      - portal-member
      summary: Get profile Privacy settings
      responses:
        '200':
          description: Privacy settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/PrivacySettings'
    put:
      tags:
      - portal-member
      summary: Update profile Privacy settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrivacySettings'
      responses:
        '200':
          description: Updated
  /api/v1/member/profiles/{profile_id}/settings/parental:
    parameters:
    - $ref: '#/components/parameters/ProfileId'
    get:
      tags:
      - portal-member
      summary: Get Parental control settings
      responses:
        '200':
          description: Parental control settings
          content:
            application/json:
              schema: &id006
                type: object
                properties:
                  data: &id005
                    $ref: '#/components/schemas/ParentalSettings'
    put:
      tags:
      - portal-member
      summary: Update Parental control settings
      requestBody:
        required: true
        content:
          application/json:
            schema: *id005
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: *id006
  /api/v1/member/profiles/{profile_id}/allowlist:
    parameters:
    - $ref: '#/components/parameters/ProfileId'
    get:
      tags:
      - portal-member
      summary: List allowlist
      responses:
        '200':
          description: allowlist rules
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProfileRule'
                  meta:
                    $ref: '#/components/schemas/PageMeta'
      parameters:
      - name: keyword
        in: query
        schema:
          type: string
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
    post:
      tags:
      - portal-member
      summary: Create allowlist rule
      description: Alias of profile rules with list_type=allow and action=allow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListRuleCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ProfileRule'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
